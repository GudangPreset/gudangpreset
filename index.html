<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gudang Preset AM - Home</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .active-tab { border-bottom: 3px solid #60a5fa; color: #60a5fa; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans pb-10">

    <header class="p-6 bg-gray-800 border-b border-gray-700 sticky top-0 z-20">
        <div class="max-w-5xl mx-auto flex flex-col md:flex-row justify-between items-center gap-4">
            <h1 class="text-2xl font-bold text-blue-400"><i class="fas fa-layer-group mr-2"></i>Preset AM Dibawah 5Mb</h1>
            <input type="text" id="searchInput" placeholder="Cari judul preset..." 
                class="w-full md:w-64 p-2 rounded-lg bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500 text-sm">
        </div>
    </header>

    <nav class="bg-gray-800 border-b border-gray-700 sticky top-[81px] md:top-[73px] z-10 overflow-x-auto">
        <div class="max-w-5xl mx-auto flex items-center px-6 py-4">
            <p class="text-sm md:text-base font-medium text-blue-300">
                <i class="fas fa-info-circle mr-2"></i>Semua preset tersedia di sini dan akan update setiap harinya.
            </p>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6">
        <div id="presetContainer" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
            </div>
    </main>

    <script>
        // DATA PRESET
        const presets = [
            { title: "JJ Kece", category: "JJ Kece", link: "jjkece.html" },
            { title: "JJ Gameplay", category: "JJ GamePlay", link: "jjgameplay.html" },
            { title: "JJ Full Bass", category: "JJ Full Bass", link: "jjfullbas.html" },
            { title: "Sinematic", category: "Sinematic", link: "sinematic.html" },
            { title: "JJ Collab", category: "JJ Collab", link: "jjcollab.html" },
            { title: "JJ Tipis", category: "JJ Tipis", link: "jjtipis.html" },
            { title: "Slowmo", category: "JJ Slowmo", link: "slowmo.html" }
        ];

        const container = document.getElementById('presetContainer');
        const searchInput = document.getElementById('searchInput');

        function displayPresets(data) {
            container.innerHTML = '';
            if(data.length === 0) {
                container.innerHTML = `<p class="col-span-full text-center text-gray-500 py-10">Preset tidak ditemukan...</p>`;
                return;
            }

            data.forEach(item => {
                // LOGIKA TAB: Jika link mengandung '.html', buka di tab yang sama (_self)
                const isInternal = item.link.includes('.html');
                const targetWindow = isInternal ? '_self' : '_blank';
                const btnText = isInternal ? 'Buka Koleksi' : 'Import Preset';

                const card = `
                    <div class="bg-gray-800 rounded-xl overflow-hidden border border-gray-700 hover:scale-[1.02] transition-transform shadow-lg">
                        <div class="p-4 border-b border-gray-700 flex justify-between items-center">
                            <span class="text-[10px] uppercase font-black px-2 py-1 bg-gray-900 text-blue-400 tracking-wider rounded">${item.category}</span>
                            <span class="text-[10px] text-gray-500">${item.date}</span>
                        </div>
                        <div class="p-5">
                            <h3 class="text-lg font-bold mb-5 line-clamp-1">${item.title}</h3>
                            <div class="flex gap-2">
                                <a href="${item.link}" target="${targetWindow}" 
                                    class="flex-1 bg-blue-600 hover:bg-blue-700 text-center py-2.5 rounded-lg text-xs font-black uppercase transition shadow-lg shadow-blue-900/20">
                                    ${btnText}
                                </a>
                                <button onclick="copyLink('${item.link}')" 
                                    class="bg-gray-700 hover:bg-gray-600 px-4 py-2 rounded-lg transition border border-gray-600">
                                    <i class="fas fa-copy text-sm text-gray-300"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        // Fungsi Cari
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            const filtered = presets.filter(p => p.title.toLowerCase().includes(val));
            displayPresets(filtered);
        });

        // Fungsi Copy
        function copyLink(text) {
            if(text === "#" || text.includes(".html")) {
                alert("Ini adalah folder koleksi, silakan buka terlebih dahulu.");
                return;
            }
            navigator.clipboard.writeText(text);
            alert('Link Preset berhasil disalin!');
        }

        // Jalankan saat pertama load
        displayPresets(presets);
    </script>
</body>
</html>
